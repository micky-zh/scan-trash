name: hk_spot_baseline_first_pass
version: "0.2"
objective: >
  Remove obvious low-quality, illiquid, or hard-to-study names from the live Hong Kong
  market snapshot before any alphabetical review. This rule is a trash filter, not the
  full value-investing baseline.
universe: hk_equities
exclude_tags:
  - warrant
  - structured_product
sort_by:
  - 名称
conditions:
  - field: 最新价
    operator: ">="
    value: 0.5
    rationale: Remove penny-stock territory where quoted cheapness is often misleading.
  - field: 成交额
    operator: ">="
    value: 1000000
    rationale: Avoid names with very weak daily liquidity in the first pass.
  - field: 总市值
    operator: ">="
    value: 5000000000
    rationale: Focus on companies large enough for an initial quality-oriented pass.
  - field: 市盈率-动态
    operator: ">"
    value: 0
    rationale: Exclude currently loss-making companies from the baseline pass.
notes:
  - This is the live-market trash filter only, not the full financial baseline.
  - No static PB threshold is used at this stage because sector context matters.
  - Banks, insurers, property, and cyclical names still need sector-level treatment later.
  - Full first-pass quality rules live in rules/screening/baseline.yaml and docs/principles.md.
