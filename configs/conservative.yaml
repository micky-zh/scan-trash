name: conservative
version: "0.1"
description: Conservative config that keeps blacklist enabled and writes to a separate CSV.
fetch:
  enabled: true
  apply_blacklist: true
  blacklist_file: rules/blacklists/default.yaml
baseline:
  rule_file: rules/screening/hk_spot_baseline.yaml
output:
  save_csv: true
  raw_csv_path: data/raw/hk_spot_full_conservative.csv
  screened_csv_path: data/processed/hk_screened_conservative.csv
sector_profiles:
  - docs/playbooks/sector_screening_framework.md
